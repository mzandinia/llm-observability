name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project2 dependencies
        run: pip install -r project2-agentic-incident-assistant/requirements.txt

      - name: Install llm-observability dependencies
        run: pip install -r llm-observability/requirements.txt

      - name: Run tests
        working-directory: llm-observability
        run: pytest tests/ -v
